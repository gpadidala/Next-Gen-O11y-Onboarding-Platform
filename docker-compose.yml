services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: obsplatform
      POSTGRES_USER: obsplatform
      POSTGRES_PASSWORD: obsplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://obsplatform:obsplatform@db:5432/obsplatform
      CORS_ORIGINS_STR: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: INFO
      APP_ENV: development
      APP_DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
